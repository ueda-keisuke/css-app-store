<!DOCTYPE html>
<html lang="{{lang}}">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;900&family=Noto+Sans+KR:wght@400;900&family=Noto+Sans+SC:wght@400;900&family=Inter:wght@400;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans KR', sans-serif;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #0d0d0d;
    /* Subtle brick-wall pattern */
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 80px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 100px;
    padding: 120px 80px;
    position: relative;
  }

  /* Ambient glow behind text */
  .screen::before {
    content: '';
    position: absolute;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 255, 255, 0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .neon-blue {
    position: relative;
    font-size: 180px;
    font-weight: 900;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.0;
    white-space: pre-line;
    color: #fff;
    text-shadow:
      0 0 7px #fff,
      0 0 10px #fff,
      0 0 21px #fff,
      0 0 42px #0fa,
      0 0 82px #0fa,
      0 0 92px #0fa,
      0 0 102px #0fa,
      0 0 151px #0fa;
  }

  .neon-pink {
    position: relative;
    font-size: 140px;
    font-weight: 900;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.1;
    white-space: pre-line;
    color: #fff;
    text-shadow:
      0 0 7px #fff,
      0 0 10px #fff,
      0 0 21px #fff,
      0 0 42px #ff2d95,
      0 0 82px #ff2d95,
      0 0 92px #ff2d95,
      0 0 102px #ff2d95,
      0 0 151px #ff2d95;
  }

  .neon-line {
    width: 800px;
    height: 2px;
    background: #0fa;
    box-shadow:
      0 0 7px #0fa,
      0 0 20px #0fa,
      0 0 40px #0fa;
    border-radius: 2px;
  }

  .dim-text {
    font-size: 56px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.3);
    text-align: center;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    white-space: pre-line;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="neon-blue">{{line1}}</div>
  <div class="neon-line"></div>
  <div class="neon-pink">{{line2}}</div>
  <div class="dim-text">{{line3}}</div>
</div>
</body>
</html>
