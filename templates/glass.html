<!DOCTYPE html>
<html lang="{{lang}}">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Noto+Sans+KR:wght@700;900&family=Noto+Sans+SC:wght@700;900&family=Inter:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans KR', sans-serif;
  }

  .screen {
    width: 100%;
    height: 100%;
    background:
      radial-gradient(circle at 20% 20%, #ff6b6b 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, #feca57 0%, transparent 40%),
      radial-gradient(circle at 50% 60%, #48dbfb 0%, transparent 40%),
      radial-gradient(circle at 20% 80%, #ff9ff3 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, #54a0ff 0%, transparent 40%),
      #1a1a2e;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 80px;
    padding: 120px 80px;
    position: relative;
  }

  /* Floating blobs behind the glass */
  .screen::before,
  .screen::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }

  .screen::before {
    width: 600px;
    height: 600px;
    background: rgba(255, 107, 107, 0.6);
    top: 15%;
    left: 10%;
  }

  .screen::after {
    width: 500px;
    height: 500px;
    background: rgba(72, 219, 251, 0.5);
    bottom: 20%;
    right: 10%;
  }

  .glass-card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 48px;
    padding: 100px 80px;
    width: 1050px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .glass-card h1 {
    font-size: 120px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    white-space: pre-line;
  }

  .glass-card p {
    font-size: 56px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.7);
    line-height: 1.4;
    white-space: pre-line;
  }

  .badge {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 100px;
    padding: 24px 56px;
    font-size: 48px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="badge">{{badge}}</div>
  <div class="glass-card">
    <h1>{{line1}}</h1>
    <p>{{line2}}</p>
  </div>
</div>
</body>
</html>
