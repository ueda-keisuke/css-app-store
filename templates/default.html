<!DOCTYPE html>
<html lang="{{lang}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Noto+Sans+KR:wght@700;900&family=Noto+Sans+SC:wght@700;900&family=Inter:wght@700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans KR', sans-serif;
  }

  .screen {
    width: 100%;
    height: 100%;
    background-color: {{backgroundColor}};
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .headline {
    color: {{textColor}};
    font-size: 96px;
    font-weight: 900;
    line-height: 1.15;
    text-align: center;
    padding: 80px 80px 0;
    white-space: pre-line;
    /* テキストに軽い影をつけて読みやすく */
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  }

  .screenshot-container {
    position: absolute;
    bottom: -80px;
    display: flex;
    justify-content: center;
    width: 100%;
  }

  .phone-frame {
    width: 1050px;
    height: 2280px;
    border-radius: 64px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
  }

  .phone-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
<div class="screen">
  <h1 class="headline">{{headline}}</h1>
  <div class="screenshot-container">
    <div class="phone-frame">
      <img src="{{screenshot}}" alt="App Screenshot">
    </div>
  </div>
</div>
</body>
</html>
