<!DOCTYPE html>
<html lang="{{lang}}">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Noto+Sans+KR:wght@900&family=Noto+Sans+SC:wght@900&family=Inter:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans KR', sans-serif;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: #fdf6e3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 60px;
    padding: 120px 80px;
    position: relative;
    overflow: hidden;
  }

  /* Sunburst rays */
  .screen::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: repeating-conic-gradient(
      from 0deg,
      rgba(0, 0, 0, 0.03) 0deg 10deg,
      transparent 10deg 20deg
    );
  }

  /* Film grain texture */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
  }

  .retro-banner {
    position: relative;
    z-index: 1;
    background: #c0392b;
    padding: 30px 80px;
    transform: rotate(-3deg);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  }

  .retro-banner span {
    font-size: 72px;
    font-weight: 900;
    color: #fdf6e3;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    white-space: nowrap;
  }

  .retro-main {
    position: relative;
    z-index: 1;
    font-size: 180px;
    font-weight: 900;
    text-transform: uppercase;
    text-align: center;
    line-height: 0.95;
    white-space: pre-line;
    color: #2c3e50;
    text-shadow:
      6px 6px 0 #e74c3c,
      12px 12px 0 rgba(0,0,0,0.08);
  }

  .retro-sub {
    position: relative;
    z-index: 1;
    font-size: 64px;
    font-weight: 900;
    color: #2c3e50;
    text-align: center;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    white-space: pre-line;
    border-top: 6px solid #2c3e50;
    border-bottom: 6px solid #2c3e50;
    padding: 20px 0;
  }

  /* Decorative stars */
  .star {
    position: relative;
    z-index: 1;
    font-size: 48px;
    color: #e74c3c;
    letter-spacing: 0.5em;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="retro-banner"><span>{{banner}}</span></div>
  <div class="retro-main">{{line1}}</div>
  <div class="star">&#9733; &#9733; &#9733; &#9733; &#9733;</div>
  <div class="retro-sub">{{line2}}</div>
</div>
</body>
</html>
