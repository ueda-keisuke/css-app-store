<!DOCTYPE html>
<html lang="{{lang}}">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Noto+Sans+KR:wght@700;900&family=Noto+Sans+SC:wght@700;900&family=Inter:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans KR', sans-serif;
  }

  .screen {
    width: 100%;
    height: 100%;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* Split background */
  .left-half {
    width: 50%;
    height: 100%;
    background: {{colorA}};
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    padding: 120px 20px 120px 80px;
    gap: 40px;
  }

  .right-half {
    width: 50%;
    height: 100%;
    background: {{colorB}};
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 120px 80px 120px 20px;
    gap: 40px;
  }

  /* Text that crosses the boundary */
  .crossover {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .crossover h1 {
    font-size: 180px;
    font-weight: 900;
    text-transform: uppercase;
    text-align: center;
    line-height: 0.95;
    white-space: pre-line;
    color: #fff;
    mix-blend-mode: difference;
  }

  .crossover .tagline {
    font-size: 64px;
    font-weight: 700;
    text-align: center;
    color: #fff;
    mix-blend-mode: difference;
    letter-spacing: 0.1em;
    white-space: pre-line;
  }

  /* Decorative circles */
  .circle {
    position: absolute;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15);
    mix-blend-mode: difference;
  }
  .circle:nth-child(1) { width: 300px; height: 300px; top: 8%; left: -5%; }
  .circle:nth-child(2) { width: 200px; height: 200px; bottom: 12%; right: -3%; }
  .circle:nth-child(3) { width: 500px; height: 500px; top: 60%; left: 30%; }
</style>
</head>
<body>
<div class="screen">
  <div class="left-half"></div>
  <div class="right-half"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="crossover">
    <h1>{{line1}}</h1>
    <div class="tagline">{{line2}}</div>
  </div>
</div>
</body>
</html>
