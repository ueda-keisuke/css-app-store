<!DOCTYPE html>
<html lang="{{lang}}">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Noto+Sans+KR:wght@900&family=Noto+Sans+SC:wght@900&family=Inter:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', 'Noto Sans KR', sans-serif;
    background: #0a0a0a;
  }

  .screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 60px;
    padding: 120px 60px;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(120, 0, 255, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, rgba(255, 0, 150, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 50%),
      #0a0a0a;
  }

  .gradient-text {
    font-size: 200px;
    font-weight: 900;
    line-height: 0.95;
    text-align: center;
    text-transform: uppercase;
    white-space: pre-line;
    background: linear-gradient(
      135deg,
      #ff0080 0%,
      #ff8c00 20%,
      #ffef00 35%,
      #00ff87 50%,
      #00c8ff 65%,
      #7b61ff 80%,
      #ff0080 100%
    );
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 60px rgba(255, 0, 128, 0.3));
  }

  .subtitle {
    font-size: 72px;
    font-weight: 900;
    color: rgba(255, 255, 255, 0.6);
    text-align: center;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: pre-line;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="gradient-text">{{line1}}</div>
  <div class="subtitle">{{line2}}</div>
</div>
</body>
</html>
